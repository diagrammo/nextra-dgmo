name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # knip/jscpd/depcheck analyze source + package.json only — no dist
      # needed, so the trio runs right after install.
      - name: Hygiene checks (dead code, duplication, deps)
        run: pnpm check:all

      # Build first so the exports map (config/client) resolves through
      # dist/ before typecheck/tests run.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
