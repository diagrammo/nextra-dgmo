name: Bug report
description: Report a problem with nextra-dgmo
title: '[Bug] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        **Triage hint:** if your symptom looks like one of these, you may be in the wrong repo —
        - "Diagram looks wrong regardless of host site" → file in [`dgmo`](https://github.com/diagrammo/dgmo/issues)
        - "Fenced block isn't being processed at all" → file in [`remark-dgmo`](https://github.com/diagrammo/remark-dgmo/issues)
        - "Color-mode toggle doesn't switch diagrams" → file in [`remark-dgmo`](https://github.com/diagrammo/remark-dgmo/issues) (the CSS lives there)
        - "`next build` errors" → file in [`nextra-dgmo`](https://github.com/diagrammo/nextra-dgmo/issues)
        We'll re-route mistakes silently — no need to repost.
  - type: textarea
    id: symptom
    attributes:
      label: What happened?
      description: Brief description of the actual vs expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimum reproduction
      description: A minimal `next.config.mjs` plus an MDX snippet that reproduces the bug.
      render: markdown
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: 'nextra-dgmo, remark-dgmo, @diagrammo/dgmo, nextra, next, Node'
      placeholder: 'nextra-dgmo 0.1.0; remark-dgmo 0.4.0; @diagrammo/dgmo 0.39.0; nextra 4.0.0; next 16.0.0; node 22.11'
    validations:
      required: true
